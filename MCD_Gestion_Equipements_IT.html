<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCD — Gestion IT · SEDANA TG</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;font-size:13px;background:#f8f9fa;color:#212529;overflow:hidden;height:100vh}

/* ─── TOP NAV ─────────────────────────────────────────────────── */
.nav{position:fixed;top:0;left:0;right:0;height:44px;background:#1a6fa6;display:flex;align-items:center;z-index:1000;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.nav-grid{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.85);font-size:18px;border-right:1px solid rgba(255,255,255,.15)}
.nav-grid:hover{background:rgba(255,255,255,.12)}
.nav-brand{padding:0 14px;font-size:14px;font-weight:700;color:#fff;border-right:1px solid rgba(255,255,255,.15);height:44px;display:flex;align-items:center;white-space:nowrap;letter-spacing:.2px}
.nav-items{display:flex;height:44px;flex:1;overflow:hidden}
.nav-item{height:44px;padding:0 14px;display:flex;align-items:center;color:rgba(255,255,255,.85);font-size:13px;cursor:pointer;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08)}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.15);color:#fff}
.nav-item.active{font-weight:600}
.nav-right{display:flex;align-items:center;gap:2px;padding:0 8px}
.nav-icon{width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.85);font-size:15px}
.nav-icon:hover{background:rgba(255,255,255,.15);color:#fff}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:#e67e22;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:0 4px}
.nav-user{padding:0 6px;cursor:pointer}
.nav-user .u-name{color:#fff;font-size:12px;font-weight:600;line-height:1.3}
.nav-user .u-role{color:rgba(255,255,255,.7);font-size:11px}

/* ─── MAIN ─────────────────────────────────────────────────────── */
.main{margin-top:44px;height:calc(100vh - 44px);display:flex;flex-direction:column;overflow:hidden}

/* ─── CONTROL PANEL ────────────────────────────────────────────── */
.cp{background:#fff;border-bottom:1px solid #dee2e6;flex-shrink:0}
.cp-top{padding:10px 16px 6px;display:flex;align-items:center;gap:10px}
.cp-title{font-size:20px;font-weight:300;color:#212529;flex-shrink:0;margin-right:6px}
.cp-actions{display:flex;gap:6px}
.btn{border:none;border-radius:3px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:5px 14px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-p{background:#1a6fa6;color:#fff}
.btn-s{background:#fff;color:#555;border:1px solid #ced4da}
.btn-icon{background:#fff;border:1px solid #ced4da;padding:5px 9px;border-radius:3px;cursor:pointer;color:#555;font-size:14px;line-height:1}
.btn-icon:hover{background:#f5f5f5}
.search-input{border:1px solid #ced4da;border-radius:20px;padding:5px 14px;font-size:13px;outline:none;width:100%;max-width:380px;background:#f8f9fa;color:#333;transition:all .2s;margin-left:auto}
.search-input:focus{background:#fff;border-color:#1a6fa6;box-shadow:0 0 0 2px rgba(26,111,166,.15)}
.cp-bot{padding:4px 16px 7px;display:flex;align-items:center;gap:6px}
.filter-btn{display:flex;align-items:center;gap:4px;border:1px solid #ced4da;background:#fff;padding:3px 10px;border-radius:3px;font-size:12px;color:#555;cursor:pointer}
.filter-btn:hover{background:#f5f5f5}
.pager{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:#6c757d}
.pager-btn{width:22px;height:22px;border:1px solid #dee2e6;background:#fff;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555}
.pager-btn:hover:not([disabled]){background:#f5f5f5}
.pager-btn[disabled]{opacity:.4;cursor:default}

/* ─── TABS ──────────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid #dee2e6;background:#fff;overflow-x:auto;flex-shrink:0}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;color:#6c757d;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:#1a6fa6}
.tab.on{color:#1a6fa6;border-bottom-color:#1a6fa6;font-weight:600}

/* ─── CONTENT ────────────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;background:#fff}

/* ─── LIST TABLE ────────────────────────────────────────────────── */
.list-table{width:100%;border-collapse:collapse;font-size:13px}
.list-table thead tr{border-bottom:1px solid #dee2e6}
.list-table th{padding:8px 12px;font-weight:700;font-size:11px;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;background:#fff;text-align:left;cursor:pointer;white-space:nowrap;border-right:1px solid #f0f0f0;user-select:none}
.list-table th:last-child{border-right:none}
.list-table th:hover{color:#333}
.list-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle;border-right:1px solid #f9f9f9}
.list-table td:last-child{border-right:none}
.list-table tbody tr:hover td{background:#f5f9fc;cursor:pointer}
.list-table tbody tr.sel td{background:#e8f3fc}
.check{width:14px;height:14px;cursor:pointer;accent-color:#1a6fa6}
.f-link{color:#1a6fa6;font-weight:500;cursor:pointer}
.f-link:hover{text-decoration:underline}
.f-muted{color:#6c757d}
.f-mono{font-family:'Consolas',monospace;font-size:12px}
.f-code{font-family:'Consolas',monospace;font-size:11px;background:#f1f3f5;padding:1px 6px;border-radius:3px;color:#495057}

/* ─── BADGES ─────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-auth{background:#cfe2ff;color:#084298}
.b-equip{background:#d1e7dd;color:#0f5132}
.b-ops{background:#fff3cd;color:#664d03}
.b-chat{background:#e2d9f3;color:#432874}
.b-pk{background:#fff3cd;color:#856404}
.b-fk{background:#cfe2ff;color:#084298}
.b-idx{background:#f3e8ff;color:#6f2da8}
.b-nn{background:#d1e7dd;color:#0f5132}
.b-arr{background:#fce4ec;color:#880e4f}
.b-1n{background:#e0f7fa;color:#006064}
.b-nm{background:#fce4ec;color:#880e4f}
.b-11{background:#f3e8ff;color:#4a148c}
.b-self{background:#fff8e1;color:#f57f17}

/* ─── DIALOG ─────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:#fff;border-radius:4px;width:92%;max-width:960px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 12px 48px rgba(0,0,0,.25)}
.dlg-hdr{background:#f8f9fa;border-bottom:1px solid #dee2e6;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.dlg-crumb{font-size:12px;color:#6c757d}
.dlg-crumb a{color:#1a6fa6;cursor:pointer}
.dlg-crumb a:hover{text-decoration:underline}
.dlg-title{font-size:15px;font-weight:700;color:#212529}
.dlg-close{margin-left:auto;cursor:pointer;font-size:20px;color:#6c757d;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.dlg-close:hover{background:#e9ecef;color:#333}
.dlg-body{flex:1;overflow-y:auto;padding:0}
.dlg-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#dee2e6;border-bottom:1px solid #dee2e6}
.dlg-meta-cell{background:#fff;padding:10px 16px}
.dlg-meta-lbl{font-size:11px;font-weight:600;color:#6c757d;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.dlg-meta-val{font-size:13px;color:#212529}

/* ─── NOTES ──────────────────────────────────────────────────────── */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px}
.note-card{background:#fff;border:1px solid #dee2e6;border-left:4px solid #1a6fa6;border-radius:3px;padding:16px}
.note-title{font-weight:700;font-size:13px;color:#212529;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.note-body{font-size:12px;color:#555;line-height:1.7}
.note-body code{background:#f1f3f5;padding:1px 5px;border-radius:3px;font-size:11px;color:#495057}

/* ─── DIAGRAM ────────────────────────────────────────────────────── */
.diagram-wrap{padding:20px;background:#f8f9fa;overflow:auto}
.diagram-card{background:#fff;border:1px solid #dee2e6;border-radius:4px;overflow:hidden}
.diagram-toolbar{padding:8px 16px;border-bottom:1px solid #dee2e6;display:flex;gap:8px;align-items:center;background:#fff}
.diagram-legend{display:flex;flex-wrap:wrap;gap:16px;padding:12px 20px;border-top:1px solid #f0f0f0;background:#fafafa;font-size:12px;color:#6c757d}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}

/* ─── SCROLLBAR ──────────────────────────────────────────────────── */
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#999}

/* ─── PRINT ──────────────────────────────────────────────────────── */
@media print{
  .nav,.btn-icon,.filter-btn,.pager,.overlay{display:none!important}
  .main{margin-top:0!important;height:auto!important;overflow:visible!important}
  .content{overflow:visible!important}
}
</style>
</head>

<div class="nav">

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function badge(label, cls) {
  return `<span class="badge ${cls}">${label}</span>`;
}
function constraintBadges(arr) {
  return arr.map(c => {
    if(c==='PK') return badge(c,'b-pk');
    if(c.startsWith('FK')) return badge(c,'b-fk');
    if(c==='IDX') return badge(c,'b-idx');
    if(c==='NOT NULL') return badge(c,'b-nn');
    if(c==='ARRAY') return badge(c,'b-arr');
    if(c==='UNIQUE') return badge('UNIQUE','b-1n');
    return badge(c,'badge' in c ? 'b-nn':'b-nn');
  }).join(' ');
}
function typeBadge(type) {
  const cls = {auth:'b-auth',equip:'b-equip',ops:'b-ops',chat:'b-chat'};
  return badge(MOD_LABELS[type]||type, cls[type]||'b-nn');
}
function relTypeBadge(type) {
  const map = {'1n':['1:N','b-1n'],'11':['1:1','b-11'],'nm':['N:M','b-nm'],'self':['Auto-ref','b-self']};
  const [l,c] = map[type]||[type,'b-nn'];
  return badge(l,c);
}
function hl(text, q) {
  if(!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return String(text).replace(re, '<mark style="background:#fff3cd;padding:0 2px;border-radius:2px">$1</mark>');
}

═══════════════════════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('on'));
  const tabEl = document.getElementById('tab-'+tab);
  if(tabEl) tabEl.classList.add('on');
  // Nav item
  const navLabels = {entities:'Entités', diagram:'Diagramme ERD', relations:'Relations', indexes:'Index', notes:'Notes de conception', cols:'Toutes les colonnes'};
  document.querySelectorAll('.nav-item').forEach(el => {
    if(el.textContent.trim().startsWith(navLabels[tab]?.split(' ')[0]||'__')) el.classList.add('active');
  });
  const titles = {entities:'Entités / Tables', cols:'Colonnes — toutes les tables', diagram:'Diagramme Entité-Association', relations:'Relations & Cardinalités', indexes:'Index de performance', notes:'Notes de conception'};
  document.getElementById('cp-title').textContent = titles[tab]||tab;
  render();
}
function onSearch(q) { searchQ = q; render(); }
function toggleGroupBy() { groupByModule = !groupByModule; render(); }

function render() {
  const area = document.getElementById('content-area');
  if(currentTab==='entities') renderEntities(area);
  else if(currentTab==='cols') renderCols(area);
  else if(currentTab==='diagram') renderDiagram(area);
  else if(currentTab==='relations') renderRelations(area);
  else if(currentTab==='indexes') renderIndexes(area);
  else if(currentTab==='notes') renderNotes(area);
}

/* ─── ENTITIES ─────────────────────────────────────────── */
function renderEntities(area) {
  const q = searchQ.toLowerCase();
  let data = ENTITIES.filter(e =>
    !q || e.name.toLowerCase().includes(q) || e.table.toLowerCase().includes(q) ||
    MOD_LABELS[e.module].toLowerCase().includes(q) || e.desc.toLowerCase().includes(q)
  );
  document.getElementById('pager-count').textContent = data.length + ' entité(s)';

  if(groupByModule) {
    let html = '';
    const groups = ['auth','equip','ops','chat'];
    groups.forEach(mod => {
      const grp = data.filter(e => e.module===mod);
      if(!grp.length) return;
      html += `<div style="padding:6px 12px 2px;background:#f8f9fa;border-bottom:1px solid #dee2e6;font-size:11px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px">
        ${typeBadge(mod)} &nbsp;${MOD_LABELS[mod]} — ${grp.length} table(s)
      </div>`;
      html += rowsHTML(grp, q);
    });
    area.innerHTML = `<div class="list-view"><table class="list-table"><thead>${thead()}</thead><tbody>${html}</tbody></table></div>`;
  } else {
    area.innerHTML = `<div class="list-view"><table class="list-table"><thead>${thead()}</thead><tbody>${rowsHTML(data,q)}</tbody></table></div>`;
  }
}

function thead() {
  return `<tr>
    <th style="width:32px"><input type="checkbox" class="check" onclick="toggleAll(this)"></th>
    <th>MODULE</th>
    <th>NOM</th>
    <th>TABLE (SQL)</th>
    <th>DESCRIPTION</th>
    <th style="text-align:center">COLONNES</th>
    <th style="text-align:center">RELATIONS</th>
    <th>TYPE CLÉS</th>
  </tr>`;
}

function rowsHTML(data, q) {
  return data.map((e,i) => {
    const hasPK = e.fields.some(f => f.constraints.includes('PK'));
    const fks = e.fields.filter(f => f.constraints.some(c => c.startsWith('FK'))).length;
    const hasArr = e.fields.some(f => f.constraints.includes('ARRAY'));
    return `<tr onclick="openDetail('${e.id}')" id="row-${e.id}">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="check" onchange="selectRow('${e.id}',this.checked)"></td>
      <td>${typeBadge(e.module)}</td>
      <td class="f-link">${hl(e.name, searchQ)}</td>
      <td class="f-mono f-code">${hl(e.table, searchQ)}</td>
      <td class="f-muted" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hl(e.desc, searchQ)}</td>
      <td style="text-align:center;color:#555">${e.fields.length}</td>
      <td style="text-align:center;color:#555">${e.rels}</td>
      <td>
        ${hasPK ? badge('PK','b-pk') : ''}
        ${fks ? badge(fks+' FK','b-fk') : ''}
        ${hasArr ? badge('ARRAY','b-arr') : ''}
      </td>
    </tr>`;
  }).join('');
}

function toggleAll(cb) {
  document.querySelectorAll('.list-table .check').forEach(c => c.checked = cb.checked);
}
function selectRow(id, checked) {
  const row = document.getElementById('row-'+id);
  if(row) row.classList.toggle('sel', checked);
}

function entityBox(x,y,w,h,label,mod,color,entityId) {
  const modCols = {auth:'#dbeafe',equip:'#d1fae5',ops:'#fef3c7',chat:'#ede9fe'};
  const bg = modCols[mod]||'#f1f5f9';
  const entity = ENTITIES.find(e=>e.id===entityId);
  if(!entity) return '';
  const preview = entity.fields.slice(0,4);
  const more = entity.fields.length - preview.length;
  let rows = preview.map(f => {
    const isPK = f.constraints.includes('PK');
    const isFK = f.constraints.some(c=>c.startsWith('FK'));
    const isArr = f.constraints.includes('ARRAY');
    const pre = isPK?'🔑 ':isFK?'↗ ':isArr?'≡ ':'  ';
    return `<text x="${x+10}" y="0" font-size="9" fill="${isPK?'#92400e':isFK?'#1d4ed8':isArr?'#9d174d':'#374151'}">${pre}${f.name}</text>`;
  });
  const rowH = 14;
  const textRows = preview.map((f,i) => {
    const isPK = f.constraints.includes('PK');
    const isFK = f.constraints.some(c=>c.startsWith('FK'));
    const isArr = f.constraints.includes('ARRAY');
    const pre = isPK?'🔑 ':isFK?'↗ ':isArr?'≡ ':'   ';
    return `<text x="${x+10}" y="${y+50+i*rowH}" font-size="9" fill="${isPK?'#92400e':isFK?'#1d4ed8':isArr?'#9d174d':'#374151'}" font-family="Consolas,monospace">${pre}${f.name}</text>`;
  }).join('');
  const moreText = more>0?`<text x="${x+10}" y="${y+50+preview.length*rowH}" font-size="9" fill="#9ca3af">   +${more} autres colonnes…</text>`:'';
  return `
    <g style="cursor:pointer" onclick="openDetail('${entityId}')">
      <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="white" stroke="${color}" stroke-width="1.5" filter="url(#sh)"/>
      <rect x="${x}" y="${y}" width="${w}" height="32" rx="6" fill="${color}"/>
      <rect x="${x}" y="${y+22}" width="${w}" height="10" fill="${color}"/>
      <text x="${x+w/2}" y="${y+21}" text-anchor="middle" font-size="11" font-weight="700" fill="white">${label}</text>
      ${textRows}
      ${moreText}
    </g>`;
}

let zoomLevel = 1;
function zoomDiagram(factor) {
  zoomLevel = Math.min(2.5, Math.max(0.4, zoomLevel * factor));
  document.getElementById('svg-scale').style.transform = `scale(${zoomLevel})`;
}
function resetZoom() {
  zoomLevel = 1;
  document.getElementById('svg-scale').style.transform = 'scale(1)';
}

  document.getElementById('dlg-crumb-name').textContent = entity.name;
  document.getElementById('dlg-title').textContent = entity.name;
  const rels = RELATIONS.filter(r => r.src===entity.table||r.tgt===entity.table);
  const body = document.getElementById('dlg-body');
  body.innerHTML = `
    <div class="dlg-meta">
      <div class="dlg-meta-cell">
        <div class="dlg-meta-lbl">Module</div>
        <div class="dlg-meta-val">${typeBadge(entity.module)}</div>
      </div>
      <div class="dlg-meta-cell">
        <div class="dlg-meta-lbl">Table SQL</div>
        <div class="dlg-meta-val f-code">${entity.table}</div>
      </div>
      <div class="dlg-meta-cell">
        <div class="dlg-meta-lbl">Colonnes</div>
        <div class="dlg-meta-val">${entity.fields.length}</div>
      </div>

      ${entity.desc}
    </div>
    <table class="list-table">
      <thead><tr>
        <th>#</th><th>COLONNE</th><th>TYPE SQL</th><th>CONTRAINTES</th><th>DESCRIPTION</th>
      </tr></thead>
      <tbody>
        ${entity.fields.map((f,i) => `<tr>
          <td class="f-muted" style="font-size:11px;font-family:monospace">${String(i+1).padStart(2,'0')}</td>
          <td class="f-mono" style="font-weight:700;color:#1a6fa6">${f.name}</td>
          <td style="color:#7c3aed;font-family:'Consolas',monospace;font-size:12px">${f.type}</td>
          <td>${constraintBadges(f.constraints)||'<span class="f-muted">—</span>'}</td>
          <td class="f-muted">${f.desc}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    ${rels.length ? `
    <div style="padding:12px 20px 4px;font-size:11px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;border-top:2px solid #f0f0f0">

    <table class="list-table">
      <thead><tr><th>#</th><th>SOURCE</th><th>CARD.</th><th>ASSOCIATION</th><th>CARD.</th><th>CIBLE</th><th>TYPE</th></tr></thead>
      <tbody>
        ${rels.map(r => `<tr>
          <td class="f-muted" style="font-size:11px;font-family:monospace">${r.id}</td>
          <td class="f-link" onclick="switchDetail('${r.src}')">${r.src}</td>
          <td style="font-family:monospace;font-weight:700;color:#495057">${r.card_src}</td>
          <td style="color:#555;font-style:italic">${r.verb}</td>
          <td style="font-family:monospace;font-weight:700;color:#495057">${r.card_tgt}</td>
          <td class="f-link" onclick="switchDetail('${r.tgt}')">${r.tgt}</td>
          <td>${relTypeBadge(r.type)}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : ''}
  `;
  document.getElementById('overlay').classList.add('show');
}

function switchDetail(id) { openDetail(id); }
function closeDialog(e) {
  if(!e || e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('show');
}
