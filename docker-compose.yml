services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestion_it
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "80:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/gestion_it
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin2024}
      DEFAULT_TECH_PASSWORD: ${DEFAULT_TECH_PASSWORD:-technicien2024}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-utilisateur2024}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
